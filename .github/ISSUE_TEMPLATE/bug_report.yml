name: 🐛 Bug Report
description: Report a bug in satware® AI MCP Proxy
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees:
  - satwareAG-ironMike

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 🌍 Environment
      description: What environment are you running in?
      options:
        - Development
        - Staging
        - Production
        - Local Docker
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 📦 Version
      description: What version of satware® AI MCP Proxy are you running?
      placeholder: e.g., 1.2.1
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: 🟢 Node.js Version
      description: What version of Node.js are you using?
      placeholder: e.g., 23.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Error Logs
      description: Please copy and paste any relevant log output.
      render: shell
      placeholder: Paste error logs here...

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context about the problem here.
      placeholder: Any additional information...

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the requested information
          required: true
        - label: I have tested this on the latest version
          required: true