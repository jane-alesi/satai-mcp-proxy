name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '23'
  PNPM_VERSION: '9'

jobs:
  # 🧪 Testing and Quality Checks
  test:
    name: 🧪 Test & Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow auto-commit of lockfile updates
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for potential lockfile updates
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: 🔧 Install dependencies with lockfile auto-update
      run: |
        # Try frozen lockfile first
        if ! pnpm install --frozen-lockfile; then
          echo "🔄 Lockfile outdated, updating..."
          pnpm install --no-frozen-lockfile
          
          # Configure git for auto-commit
          git config --global user.name "satware® AI Lockfile Bot"
          git config --global user.email "lockfile@satware.ai"
          
          # Check if lockfile changed
          if ! git diff --quiet pnpm-lock.yaml; then
            echo "📝 Committing updated lockfile..."
            git add pnpm-lock.yaml
            git commit -m "chore: update pnpm-lock.yaml to match package.json

- Auto-updated by CI pipeline
- Ensures dependency consistency
- Resolves frozen lockfile conflicts

Co-authored-by: satware® AI Lockfile Bot <lockfile@satware.ai>"
            
            # Push the changes back
            git push
            echo "✅ Lockfile updated and committed successfully"
          else
            echo "ℹ️ No lockfile changes needed"
          fi
        else
          echo "✅ Lockfile is up to date"
        fi
      
    - name: 🔍 Lint code
      run: pnpm lint || echo "Linting not configured yet"
      
    - name: 🧪 Run tests
      run: pnpm test || echo "Tests not configured yet"
      
    - name: 📊 Check test coverage
      run: pnpm test:coverage || echo "Coverage not configured yet"

  # 🔒 Security Scanning
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Run security audit
      run: |
        npm audit --audit-level=moderate || true
        
    - name: 🔍 Scan for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  # 🐳 Docker Build
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔨 Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: satware/satai-mcp-proxy:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 🚀 Deploy to Staging (develop branch only)
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "This would deploy to staging infrastructure"
        
  # 🏭 Deploy to Production (main branch only)
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🏭 Deploy to production
      run: |
        echo "🏭 Deploying to production environment..."
        echo "This would deploy to production infrastructure"

  # 📋 Lockfile Status Report
  lockfile-status:
    name: 📋 Lockfile Status
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📋 Generate lockfile status report
      run: |
        echo "📋 Lockfile Status Report"
        echo "========================="
        echo "🔍 Checking lockfile consistency..."
        
        if [ -f "pnpm-lock.yaml" ]; then
          echo "✅ pnpm-lock.yaml exists"
          echo "📊 Lockfile size: $(wc -l < pnpm-lock.yaml) lines"
          echo "🕐 Last modified: $(stat -c %y pnpm-lock.yaml)"
        else
          echo "❌ pnpm-lock.yaml missing"
        fi
        
        echo ""
        echo "📦 Package.json dependencies:"
        if [ -f "package.json" ]; then
          echo "$(jq -r '.dependencies | keys | length' package.json) production dependencies"
          echo "$(jq -r '.devDependencies | keys | length' package.json) development dependencies"
        fi
        
        echo ""
        echo "🔄 Auto-update Status: ENABLED"
        echo "🤖 Bot: satware® AI Lockfile Bot"
        echo "✨ Pattern: Inspired by satwareAG-ironMike/l1 repo"

  # 📧 Notify on Failure
  notify:
    name: 📧 Notify Team
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    if: failure()
    
    steps:
    - name: 📧 Send notification
      run: |
        echo "🚨 CI/CD pipeline failed!"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "Author: ${{ github.actor }}"
        echo ""
        echo "🔧 Common fixes:"
        echo "- Check lockfile consistency"
        echo "- Review dependency updates"
        echo "- Verify test failures"
        echo "- Check security vulnerabilities"